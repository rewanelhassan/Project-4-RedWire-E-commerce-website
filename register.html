<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <link rel="stylesheet" href="css/all.css" /> -->
    <title>register</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- <link rel="stylesheet" href="css/custom.css"> -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="bg-light px-5 shadow-sm header">
      <nav class="navbar navbar-expand-sm container-fluid">
        <a class="navbar-brand" href="index.html">
          <img
            src="images-proj-4/Gemini_Generated_Image_5unazm5unazm5una-removebg-preview.png"
            alt="Avatar Logo"
            style="width: 200px"
            class="rounded-pill"
          />
        </a>
      </nav>
    </header>

    <section>
      <div class="container signDiv">
        <div class="row">
          <div
            class="col-md-8 text-bg-light mx-auto rounded-5 form-box"
            style="margin-top: 90px ; width: 650px;"
          >
            <div class="container mt-3">
              <h2 class="text-center fs-2 mb-3">Signup</h2>
              <form id="signupform">
                <div class="cl-12 row g-2">
                  <div class="mb-3 mt-3 col-6">
                    <input
                      class="form-control shadow-sm"
                      id="fname"
                      placeholder="Enter firstname"
                    />
                  </div>
                  <div class="mb-3 mt-3 col-6">
                    <input
                      type="name"
                      class="form-control shadow-sm"
                      id="lname"
                      placeholder="Enter lastname"
                      name="name"
                    />
                  </div>
                </div>
                <div class="mb-3 mt-2">
                  <input
                    class="form-control shadow-sm"
                    id="email"
                    placeholder="Enter email"
                  />
                </div>
                <div class="mb-4">
                  <input
                    type="password"
                    class="form-control shadow-sm"
                    id="pwd"
                    placeholder="Enter password"
                    name="pswd"
                  />
                </div>
                <button class="btn btn-danger w-100 mb-3 px-5 rounded-pill" id="regbtn">Register</button>
                <p class="mt-2 mb-3 fs-6 text-center">
                  Already have account?
                  <a class="click text-danger toggle-link" href="login.html">login now</a>
                </p>
              </form>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="js/register.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
