<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <link rel="stylesheet" href="css/all.css" /> -->
    <title>home</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- <link rel="stylesheet" href="css/custom.css"> -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="bg-light shadow-sm sticky-top">
      <nav class="navbar navbar-expand-lg navbar-light container py-2">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <img
            src="images-proj-4/Gemini_Generated_Image_5unazm5unazm5una-removebg-preview.png"
            alt="RedWire Logo"
            style="max-width: 140px"
            class="img-fluid"
          />
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavbar"
          aria-controls="mainNavbar"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul
            class="navbar-nav ms-auto align-items-center loglinks"
            id="guest-links"
          >
            <li class="nav-item">
              <a class="btn btn-outline-secondary m-1 px-4" href="login.html"
                >LogIn</a
              >
            </li>
            <li class="nav-item">
              <a class="btn btn-outline-danger m-1 px-4" href="register.html"
                >SignUp</a
              >
            </li>
          </ul>

          <ul
            class="navbar-nav ms-auto d-flex align-items-center d-none"
            id="user-info"
          >
            <li class="nav-item">
              <span class="nav-link fs-5 text-dark fw-bold me-2" id="user"
                >Hello, User</span
              >
            </li>

            <li
              class="nav-item shopping-cart-wrapper position-relative px-3 py-2"
            >
              <a
                href="#"
                class="text-decoration-none text-dark position-relative"
                id="cart-icon"
              >
                <i class="fas fa-shopping-cart fs-4"></i>
                <span
                  class="badgee position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                  style="font-size: 0.75rem"
                >
                  0
                </span>
              </a>

              <div
                class="carts-products shadow-lg rounded border border-secondary-subtle bg-white p-3"
              >
                <div
                  class="cart-content mb-3 text-center"
                  style="max-height: 200px; overflow-y: auto"
                >
                  <p class="text-muted small">Your cart is empty</p>
                </div>
                <a class="btn btn-danger btn-sm w-100 py-2" href="carts.html"
                  >View All Products</a
                >
              </div>
            </li>

            <li class="nav-item ms-lg-3">
              <a
                class="btn btn-sm btn-outline-danger px-3 mt-2 mt-lg-0"
                href="#"
                id="outbtn"
                >Logout</a
              >
            </li>
          </ul>
        </div>
      </nav>
    </header>

    <section class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-12 col-md-10 col-lg-8">
          <div class="input-group input-group-lg shadow-sm">
            <button
              class="btn btn-dark dropdown-toggle rounded-start-3 fs-6"
              type="button"
              data-bs-toggle="dropdown"
              id="dropdown-search"
            >
              Search by name
            </button>
            <ul class="dropdown-menu">
              <li>
                <a class="dropdown-item dropdown-ops name-op" href="#"
                  >Search by name</a
                >
              </li>
              <li>
                <a class="dropdown-item dropdown-ops category-op" href="#"
                  >Search by category</a
                >
              </li>
            </ul>

            <input
              type="text"
              class="form-control border-secondary-subtle"
              placeholder="What are you looking for?"
              id="search"
            />

            <button class="btn btn-dark rounded-end-3 px-4" type="button">
              <i class="fas fa-search"></i> Search
            </button>
          </div>
        </div>
      </div>
    </section>

    <section>
      <div class="container">
        <div class="row g-3 allproducts">
          <div class="col-sm-1 col-md-6 col-lg-4">
            <div class="product-item rounded text-center shadow-sm p-3">
              <img
                class="img-fluid mb-2 rounded"
                src="images-proj-4/2025_Q4_Dec_Mobile_BAU_W53_PLP_Left_Tile_MacBook_Air_v17777.jpg"
                alt=""
              />

              <div class="product-item-content my-2 fs-6">
                <h5>iphone 17 pro max</h5>
                <p price="70000">Price: $70000</p>
                <p class="sp">Category : phones</p>
              </div>

              <div
                class="product-item-action d-flex justify-content-center align-items-center"
              >
                <i class="far fa-heart mx-3 fs-5"></i>
                <button class="btn btn-primary add-to-cart px-3">
                  Add to cart
                </button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- <script src="js/products.js"></script> -->
    <script src="js/script.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
