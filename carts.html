<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <link rel="stylesheet" href="css/all.css" /> -->
    <title>cart</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- <link rel="stylesheet" href="css/custom.css"> -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="bg-light shadow-sm sticky-top">
      <nav class="navbar navbar-expand-lg navbar-light container py-2">
        <a class="navbar-brand d-flex align-items-center" href="index.html">
          <img
            src="images-proj-4/Gemini_Generated_Image_5unazm5unazm5una-removebg-preview.png"
            alt="RedWire Logo"
            style="max-width: 140px"
            class="img-fluid"
          />
        </a>

        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#mainNavbar"
          aria-controls="mainNavbar"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNavbar">
          <ul
            class="navbar-nav ms-auto align-items-center loglinks"
            id="guest-links"
          >
            <li class="nav-item">
              <a class="btn btn-outline-secondary m-1 px-4" href="login.html"
                >LogIn</a
              >
            </li>
            <li class="nav-item">
              <a class="btn btn-outline-danger m-1 px-4" href="register.html"
                >SignUp</a
              >
            </li>
          </ul>

          <ul
            class="navbar-nav ms-auto d-flex align-items-center d-none"
            id="user-info"
          >
            <li class="nav-item">
              <span class="nav-link fs-5 text-dark fw-bold me-2" id="user"
                >Hello, User</span
              >
            </li>

            <li
              class="nav-item shopping-cart-wrapper position-relative px-3 py-2"
            >
              <a
                href="#"
                class="text-decoration-none text-dark position-relative"
                id="cart-icon"
              >
                <i class="fas fa-shopping-cart fs-4"></i>
                <span
                  class="badgee position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                  style="font-size: 0.75rem"
                >
                  0
                </span>
              </a>

              <div
                class="carts-products shadow-lg rounded border border-secondary-subtle bg-white p-3"
              >
                <div
                  class="cart-content mb-3 text-center"
                  style="max-height: 200px; overflow-y: auto"
                >
                  <p class="text-muted small">Your cart is empty</p>
                </div>
                <a class="btn btn-danger btn-sm w-100 py-2" href="carts.html"
                  >View All Products</a
                >
              </div>
            </li>

            <li class="nav-item ms-lg-3">
              <a
                class="btn btn-sm btn-outline-danger px-3 mt-2 mt-lg-0"
                href="#"
                id="outbtn"
                >Logout</a
              >
            </li>
          </ul>
        </div>
      </nav>
    </header>

    <section>
      <div class="container my-5">
        <div class="row gx-5 gy-4 allcartproducts justify-content-center">
          <div class="col-lg-5">
            <div
              class="cart-item shadow-sm rounded p-3 d-flex align-items-center"
            >
              <div class="cart-img me-4">
                <img
                  src="images-proj-4/08ea522d2d8570dc60900386996a3ad4.jpg"
                  alt=""
                  class="img-fluid rounded"
                />
              </div>

              <div class="cart-details flex-grow-1">
                <h5 class="fw-bold mb-1">Iphone 17 Pro Max</h5>
                <p class="text-muted mb-1">Category: Phones</p>
                <p class="fw-bold text-primary mb-3">Price: $70000</p>

                <div class="d-flex justify-content-between align-items-center">
                  <div class="quantity-box d-flex align-items-center">
                    <button class="btn btn-outline-secondary btn-sm">-</button>
                    <span class="mx-3 fw-bold">1</span>
                    <button class="btn btn-outline-secondary btn-sm">+</button>
                  </div>

                  <button class="btn btn-outline-danger btn-sm">Remove</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section>
      <div class="container">
        <div
          class="price-total mx-auto rounded-3 p-3 w-50 text-center mt-5 shadow-sm bg-light"
        >
          <h4 id="total-price" class="fw-bold text-success">
            Total Price: $19999.00
          </h4>
        </div>
      </div>
    </section>

    <hr />

    <section>
      <div class="container shadow-sm">
        <h4 class="fw-bold text-center mt-5 line-title">Favourite Items</h4>
        <p class="line bg-danger rounded-3 text-center mx-auto"></p>
        <div class="allfavproducts mt-2 d-flex mb-2">
          <div class=" col-md-3 col-sm-4">
            <div class="fav-item rounded-1 text-center shadow bg-light mx-1">
              <img
                class="img-fluid mb-2 rounded-1"
                src="images-proj-4/08ea522d2d8570dc60900386996a3ad4.jpg"
                alt=""
              />

              <div
                class="fav-item-content my-2 fs-6 justify-content-center align-items-center"
              >
                <p class="fw-bold">iphone 17 pro max</p>
                <p class="sp">Category : phones</p>
                <i class="fas fa-heart mx-3 fs-5 mb-3"></i>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <script src="js/products.js"></script>
    <script src="js/carts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
