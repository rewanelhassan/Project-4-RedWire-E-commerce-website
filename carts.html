<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- <link rel="stylesheet" href="css/all.css" /> -->
    <title>cart</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- <link rel="stylesheet" href="css/custom.css"> -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="bg-light px-5 shadow-sm">
      <nav class="navbar navbar-expand-sm container-fluid">
        <a class="navbar-brand" href="index.html">
          <img
            src="images-proj-4/Gemini_Generated_Image_5unazm5unazm5una-removebg-preview.png"
            alt="Avatar Logo"
            style="width: 200px; "
            class="rounded-pill"
          />
        </a>

        <ul class="navbar-nav d-flex fs-4 ms-auto px-5 loglinks">
          <li class="nav-item">
            <a class="btn btn-outline-primary mx-2 px-3" href="login.html"
              >LogIn</a
            >
          </li>
          <li class="nav-item">
            <a class="btn btn-primary mx-2 px-3" href="register.html">SignUp</a>
          </li>
        </ul>

        <ul
          class="navbar-nav d-flex justify-content-center align-items-cente ms-auto px-5 d-none"
          id="user-info"
        >
          <li class="nav-item">
            <a class="nav-link mx-2 px-3 fs-5" href="#" id="user"></a>
          </li>

          <li class="shopping-cart">
            <i class="fas fa-shopping-cart text-dark fs-4 px-2"
              ><span class="badgee"></span></i
            >

            <div
              class="carts-products bg-light rounded text-center border border-primary"
            >
              <div class="cart-content"></div>

              <a
                class="view-products border-top pt-2 fs-6 w-100"
                href="carts.html"
                >View All Products</a
              >
            </div>
          </li>

          <li class="nav-item">
            <a class="btn btn-outline-danger m-2 mx-3 px-3" href="#" id="outbtn"
              >Logout</a
            >
          </li>
        </ul>
      </nav>
    </header>

    <section>
      <div class="container my-5">
        <div class="row gx-5 gy-4 allcartproducts justify-content-center">
          <div class="col-lg-5">
            <div
              class="cart-item shadow-sm rounded p-3 d-flex align-items-center"
            >
              <div class="cart-img me-4">
                <img
                  src="images-proj-4/08ea522d2d8570dc60900386996a3ad4.jpg"
                  alt=""
                  class="img-fluid rounded"
                />
              </div>

              <div class="cart-details flex-grow-1">
                <h5 class="fw-bold mb-1">Iphone 17 Pro Max</h5>
                <p class="text-muted mb-1">Category: Phones</p>
                <p class="fw-bold text-primary mb-3">Price: $70000</p>

                <div class="d-flex justify-content-between align-items-center">
                  <div class="quantity-box d-flex align-items-center">
                    <button class="btn btn-outline-secondary btn-sm">-</button>
                    <span class="mx-3 fw-bold">1</span>
                    <button class="btn btn-outline-secondary btn-sm">+</button>
                  </div>

                  <button class="btn btn-outline-danger btn-sm">Remove</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section>
      <div class="container">
        <div
          class="price-total mx-auto rounded-3 p-3 w-50 text-center mt-5 shadow-sm bg-light"
        >
          <h4 id="total-price" class="fw-bold text-success">
            Total Price: $19999.00
          </h4>
        </div>
      </div>
    </section>

    <hr />

    <section>
      <div class="container shadow-sm">
        <h4 class="fw-bold text-center mt-5 line-title">Favourite Items</h4>
        <p class="line bg-danger rounded-3 text-center mx-auto"></p>
        <div class="allfavproducts mt-2 d-flex mb-2">

          <div class="col-md-3 col-sm-4">
            <div class="fav-item rounded-1 text-center shadow bg-light mx-1">
              <img
                class="img-fluid mb-2 rounded-1"
                src="images-proj-4/08ea522d2d8570dc60900386996a3ad4.jpg"
                alt=""
              />

              <div
                class="fav-item-content my-2 fs-6 justify-content-center align-items-center"
              >
                <p class="fw-bold">iphone 17 pro max</p>
                <p class="sp">Category : phones</p>
                <i class="fas fa-heart mx-3 fs-5 mb-3"></i>
              </div>
            </div>
          </div>
 
        </div>
      </div>
    </section>


    <script src="js/products.js"></script>
    <script src="js/carts.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
